<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <!-- Wobbly wind/trail line representing the flight path -->
  <path d="M 8,48 C 18,52 26,45 25,36 C 24,25 12,20 18,10 C 24,0 42,8 48,22" 
        stroke="#121417" stroke-width="1.8" fill="none" stroke-dasharray="3 3" stroke-linecap="round" opacity="0.6" />

  <!-- A second supporting flight wind line -->
  <path d="M 12,50 C 22,54 30,47 29,38" 
        stroke="#121417" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round" />

  <!-- Orange Highlight: The hand-sketched paper plane itself at the end of the trail -->
  <g transform="translate(42, 12)">
    <!-- Plane body with wobbly edges -->
    <path d="M 0,22 L 18,0 L 4,12 Z" fill="#F26522" fill-opacity="0.15" stroke="#F26522" stroke-width="2" stroke-linejoin="round" />
    <!-- Wing fold line -->
    <path d="M 18,0 L 4,12 L 0,16 M 4,12 L -6,14 L 0,22" stroke="#F26522" stroke-width="1.5" fill="none" stroke-linejoin="round" />
  </g>
</svg>
