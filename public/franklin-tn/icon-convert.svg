<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <!-- Sketched outer target ring (asymmetric ellipse) -->
  <path d="M 32,5 C 47,4 58,16 57,31 C 56,46 45,58 30,57 C 15,56 6,43 7,29 C 8,14 17,6 32,5 Z" 
        stroke="#121417" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8" />
        
  <!-- Sketched middle target ring -->
  <path d="M 32,15 C 41,14 48,22 47,31 C 46,40 39,47 29,46 C 19,45 13,38 14,29 C 15,20 22,16 32,15 Z" 
        stroke="#121417" stroke-width="1.6" stroke-dasharray="2 3" fill="none" stroke-linecap="round" opacity="0.6" />

  <!-- Orange Highlight: Sketched bullseye center -->
  <path d="M 32,25 C 36,24 39,27 38,31 C 37,35 34,38 30,37 C 26,36 23,33 24,29 C 25,25 28,26 32,25 Z" 
        stroke="#F26522" stroke-width="2.2" fill="#F26522" fill-opacity="0.15" stroke-linecap="round" />

  <!-- Sketched Arrow flying in from top-left, piercing the center -->
  <!-- Shaft with overshoots -->
  <path d="M 8,10 L 33,31" stroke="#121417" stroke-width="2.5" stroke-linecap="round" />
  <path d="M 6,8 L 12,14" stroke="#121417" stroke-width="1" stroke-linecap="round" />
  
  <!-- Arrow Head in the center -->
  <path d="M 28,31 L 34,32 L 31,26 Z" fill="#121417" stroke="#121417" stroke-width="1" stroke-linejoin="round" />

  <!-- Feathers (fletching) at the tail -->
  <path d="M 7,9 L 4,14 M 9,7 L 14,4 M 8,8 L 5,5" stroke="#121417" stroke-width="2" stroke-linecap="round" />
</svg>
