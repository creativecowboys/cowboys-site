<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <!-- Code Brackets with sketchy curves and overshoots -->
  <!-- Left Bracket `<` -->
  <path d="M 18,18 L 8,31 L 18,44" stroke="#121417" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Right Bracket `>` -->
  <path d="M 46,18 L 56,31 L 46,44" stroke="#121417" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Center cursor slash `/` (faint) -->
  <path d="M 36,12 L 28,52" stroke="#121417" stroke-width="1.5" opacity="0.25" stroke-linecap="round" />

  <!-- Orange Highlight: A sketched structural layout block in the center, representing building blocks of code -->
  <g transform="translate(24, 23)">
    <!-- Base block frame -->
    <path d="M 2,12 L 14,12 L 14,22 L 2,22 Z" stroke="#F26522" stroke-width="2" fill="#F26522" fill-opacity="0.15" stroke-linejoin="round" />
    <path d="M 4,4 L 12,4 L 12,12 L 4,12 Z" stroke="#121417" stroke-width="1.8" fill="none" stroke-linejoin="round" />
  </g>
</svg>
