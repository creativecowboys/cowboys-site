<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <!-- Wireframe Browser Window frame -->
  <path d="M 8,10 L 56,9 L 55,54 L 9,53 Z" stroke="#F4F2F0" stroke-width="2.2" fill="none" stroke-linejoin="round" />
  
  <!-- Browser top bar buttons -->
  <circle cx="14" cy="14" r="2" fill="#F4F2F0" />
  <circle cx="20" cy="14" r="2" fill="#F4F2F0" />
  <line x1="26" y1="14" x2="50" y2="14" stroke="#F4F2F0" stroke-width="1" opacity="0.4" />

  <!-- Sketched content grid elements -->
  <!-- Left column block (hero text lines) -->
  <line x1="14" y1="24" x2="32" y2="24" stroke="#F4F2F0" stroke-width="2" stroke-linecap="round" />
  <line x1="14" y1="29" x2="28" y2="29" stroke="#F4F2F0" stroke-width="1.5" stroke-linecap="round" />
  <line x1="14" y1="34" x2="24" y2="34" stroke="#F4F2F0" stroke-width="1.5" stroke-linecap="round" />

  <!-- Right column block (sketched image placeholder card with X) -->
  <path d="M 36,22 L 50,22 L 50,38 L 36,38 Z" stroke="#F4F2F0" stroke-width="1.5" fill="none" />
  <path d="M 36,22 L 50,38 M 50,22 L 36,38" stroke="#F4F2F0" stroke-width="1" opacity="0.4" />

  <!-- Orange Highlight: Sketched Call-To-Action button wireframe -->
  <path d="M 14,40 L 28,39 L 28,45 L 14,46 Z" stroke="#F26522" stroke-width="2" fill="#F26522" fill-opacity="0.2" />
  <line x1="18" y1="42.5" x2="24" y2="42.5" stroke="#F26522" stroke-width="1.5" />
</svg>
