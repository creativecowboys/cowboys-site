<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <!-- Sketched Notebook -->
  <!-- Spine with loops -->
  <path d="M 12,12 L 12,52 M 8,15 L 12,15 M 8,23 L 12,23 M 8,31 L 12,31 M 8,39 L 12,39 M 8,47 L 12,47" 
        stroke="#F4F2F0" stroke-width="2" stroke-linecap="round" />
  <!-- Notebook Page border with overshoots -->
  <path d="M 12,10 L 52,10 L 52,50 L 12,50" stroke="#F4F2F0" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" fill="none" />
  <!-- Page ruled lines -->
  <line x1="18" y1="18" x2="46" y2="18" stroke="#F4F2F0" stroke-width="1" opacity="0.3" stroke-linecap="round" />
  <line x1="18" y1="26" x2="46" y2="26" stroke="#F4F2F0" stroke-width="1" opacity="0.3" stroke-linecap="round" />
  <line x1="18" y1="34" x2="38" y2="34" stroke="#F4F2F0" stroke-width="1" opacity="0.3" stroke-linecap="round" />
  <line x1="18" y1="42" x2="32" y2="42" stroke="#F4F2F0" stroke-width="1" opacity="0.3" stroke-linecap="round" />

  <!-- Orange Highlight: Sketched Magnifying Glass -->
  <g transform="translate(38, 34)">
    <!-- Lens Ring (wobbly circle) -->
    <path d="M -8,-8 C -2,-13 9,-9 11,-1 C 13,8 7,12 -1,11 C -8,10 -12,4 -10,-4 Z" 
          stroke="#F26522" stroke-width="2.3" fill="#F26522" fill-opacity="0.1" stroke-linecap="round" />
    <!-- Handle with wobbly thick line and overshoot -->
    <path d="M 7,7 L 19,19" stroke="#F4F2F0" stroke-width="3" stroke-linecap="round" />
  </g>
</svg>
