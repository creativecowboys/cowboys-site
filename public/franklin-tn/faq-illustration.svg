<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="100%" height="100%">
  <!-- Background: Cream Paper -->
  <rect width="400" height="600" fill="#F4F2F0" />

  <!-- Sketched border framing the illustration -->
  <path d="M 15,15 L 385,13 M 383,15 L 385,585 M 387,582 L 13,585 M 15,587 L 15,12" 
        fill="none" stroke="#121417" stroke-width="1.2" opacity="0.3" stroke-linecap="round" />

  <!-- Group of Question Marks -->
  
  <!-- Question Mark 1: Left, smaller, near-black, wobbly -->
  <g transform="translate(110, 240) rotate(-12)" opacity="0.5">
    <!-- Question mark curve -->
    <path d="M -15,-60 C -15,-90 25,-95 25,-60 C 25,-40 5,-35 0,-15 C -2,-5 -2,5 -2,10" 
          fill="none" stroke="#121417" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Sketched dot -->
    <path d="M -3,35 C 2,33 6,37 4,42 C 2,47 -4,46 -5,41 C -6,37 -5,35 -3,35 Z" fill="#121417" />
  </g>

  <!-- Question Mark 2: Right, medium, near-black, wobbly -->
  <g transform="translate(260, 310) rotate(15)" opacity="0.5">
    <!-- Question mark curve -->
    <path d="M -20,-70 C -20,-105 30,-110 30,-70 C 30,-45 5,-40 0,-15 C -3,-5 -3,5 -3,15" 
          fill="none" stroke="#121417" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Sketched dot -->
    <path d="M -3,40 C 3,38 7,42 5,47 C 3,52 -4,51 -5,46 C -6,42 -5,40 -3,40 Z" fill="#121417" />
  </g>

  <!-- Question Mark 3: CENTER, LARGE, ORANGE HIGHLIGHT, BOLD SKETCH -->
  <g transform="translate(190, 250) rotate(-3)">
    <!-- Parallel strokes to give it a hand-hatched/sketched agency feel -->
    <!-- Main thick stroke -->
    <path d="M -35,-100 C -35,-155 55,-160 55,-100 C 55,-65 10,-55 0,-20 C -4,-5 -4,15 -4,30" 
          fill="none" stroke="#F26522" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Overlay thinner scribble line inside it -->
    <path d="M -33,-98 C -33,-150 50,-155 50,-98 C 50,-68 12,-58 2,-22 C -2,-7 -2,13 -2,28" 
          fill="none" stroke="#121417" stroke-width="2.5" opacity="0.75" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Large wobbly dot -->
    <path d="M -4,65 C 6,61 14,69 10,79 C 6,89 -8,87 -10,77 C -12,69 -9,63 -4,65 Z" fill="#F26522" />
    <path d="M -3,68 C 3,65 8,71 6,77 C 4,83 -4,81 -5,75 C -6,71 -5,67 -3,68 Z" fill="#121417" opacity="0.8" />
  </g>

  <!-- Hand-drawn conversational text at the bottom -->
  <text x="200" y="520" text-anchor="middle" font-family="var(--font-space-grotesk), Space Grotesk, sans-serif" font-size="16" font-weight="700" letter-spacing="0.12em" fill="#121417" opacity="0.6">ASK US ANYTHING</text>
  <path d="M 130,535 L 270,534 M 140,538 L 260,537" stroke="#121417" stroke-width="1" opacity="0.25" stroke-linecap="round" />
</svg>
