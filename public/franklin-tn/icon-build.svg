<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <!-- Sketched Blueprint Grid lines (very faint) -->
  <line x1="8" y1="12" x2="56" y2="12" stroke="#121417" stroke-width="0.5" opacity="0.15" />
  <line x1="8" y1="28" x2="56" y2="28" stroke="#121417" stroke-width="0.5" opacity="0.15" />
  <line x1="8" y1="44" x2="56" y2="44" stroke="#121417" stroke-width="0.5" opacity="0.15" />
  <line x1="12" y1="8" x2="12" y2="56" stroke="#121417" stroke-width="0.5" opacity="0.15" />
  <line x1="28" y1="8" x2="28" y2="56" stroke="#121417" stroke-width="0.5" opacity="0.15" />
  <line x1="44" y1="8" x2="44" y2="56" stroke="#121417" stroke-width="0.5" opacity="0.15" />

  <!-- Base platform line with overshoots -->
  <path d="M 6,50 L 58,49 M 7,50 L 55,51" stroke="#121417" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.9" />

  <!-- Sketched column/foundation shapes -->
  <!-- Left column -->
  <path d="M 14,50 L 13,32 L 24,32 L 23,50" stroke="#121417" stroke-width="2.2" stroke-linecap="round" fill="none" />
  <path d="M 13,32 L 24,33" stroke="#121417" stroke-width="1.8" stroke-linecap="round" />
  <!-- Center columns/house sketch with overshoot top -->
  <path d="M 28,50 L 27,24 L 42,12 L 54,23 M 42,12 L 41,50" stroke="#121417" stroke-width="2" stroke-linecap="round" fill="none" />
  
  <!-- Sketched roof line overshooting -->
  <path d="M 24,26 L 42,10 L 58,22" stroke="#121417" stroke-width="2.3" stroke-linecap="round" fill="none" />

  <!-- Orange Highlight: Sketched drafting triangle ruler overlapping the build -->
  <path d="M 18,48 L 46,20 L 46,48 Z" stroke="#F26522" stroke-width="2.5" fill="#F26522" fill-opacity="0.1" stroke-linejoin="round" stroke-linecap="round" />
  <!-- Tiny inner triangle cutout -->
  <path d="M 26,44 L 40,30 L 40,44 Z" stroke="#F26522" stroke-width="1.5" fill="none" />
</svg>
